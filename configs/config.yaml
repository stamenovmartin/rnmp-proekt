# Data Configuration
data:
  raw_path: data/raw
  processed_path: data/processed
  train_transaction: train_transaction.csv
  train_identity: train_identity.csv
  test_transaction: test_transaction.csv
  test_identity: test_identity.csv

  # Preprocessing
  train_test_split: 0.2
  random_state: 42
  target_column: isFraud

# Model Configuration
model:
  baseline_dir: models/baseline
  production_dir: models/production

  # Logistic Regression
  lr_max_iter: 1000
  lr_class_weight: balanced

  # Decision Tree
  dt_max_depth: 10
  dt_min_samples_split: 100
  dt_min_samples_leaf: 50

  # Random Forest
  rf_n_estimators: 100
  rf_max_depth: 10

# Processing
processing:
  max_missing_ratio: 0.5  # Drop columns with >50% missing
  max_categories: 50      # Max unique values for categorical